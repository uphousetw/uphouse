backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "projects"
    label: "專案項目"
    folder: "content/projects"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "text" }
      - { label: "詳細描述", name: "fullDescription", widget: "text", required: false }
      - { label: "主要圖片", name: "image", widget: "image" }
      - { label: "完工日期", name: "completionDate", widget: "string" }
      - { label: "類別", name: "category", widget: "select", options: ["透天", "華廈", "公寓", "商業空間"] }
      - { label: "位置", name: "location", widget: "string" }
      - { label: "坪數", name: "area", widget: "string" }
      - { label: "特色", name: "features", widget: "list", field: { label: "特色", name: "feature", widget: "string" } }
      - { label: "圖片集", name: "gallery", widget: "list", field: { label: "圖片", name: "image", widget: "image" } }
      - label: "品牌商標"
        name: "brandLogos"
        widget: "list"
        fields:
          - { label: "品牌名稱", name: "name", widget: "string" }
          - { label: "類別", name: "category", widget: "string" }
          - { label: "標誌圖片", name: "logoUrl", widget: "image", required: false }

  - name: "hero-images"
    label: "首頁輪播圖片"
    folder: "content/hero-images"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "標題", name: "title", widget: "string" }
      - { label: "圖片", name: "image", widget: "image" }
      - { label: "描述", name: "description", widget: "text", required: false }
      - { label: "排序", name: "order", widget: "number", default: 1 }

  - name: "contact"
    label: "聯絡資訊"
    folder: "content/contact"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{hour}}-{{minute}}"
    fields:
      - { label: "姓名", name: "name", widget: "string" }
      - { label: "電子郵件", name: "email", widget: "string" }
      - { label: "電話", name: "phone", widget: "string", required: false }
      - { label: "主旨", name: "subject", widget: "string" }
      - { label: "訊息", name: "message", widget: "text" }
      - { label: "狀態", name: "status", widget: "select", options: ["未讀", "已讀", "已回覆"], default: "未讀" }
      - { label: "提交時間", name: "createdAt", widget: "datetime" }